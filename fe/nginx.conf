server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # CSVアップロードの上限（application.yml の max-request-size 20MB に合わせる）
    client_max_body_size 20m;

    # /api はバックエンドコンテナへリバースプロキシ。
    # compose のサービス名 "backend" で名前解決される。
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;  # AI助言(Bedrock同期呼び出し)が数秒かかるため長めに
    }

    # H2 コンソール（デバッグ用。本番で不要なら location ごと削除）
    location /h2-console/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA フォールバック（React Router 等のクライアントルーティング用）
    location / {
        try_files $uri $uri/ /index.html;
    }
}
